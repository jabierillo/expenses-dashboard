<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expense Dashboard</title>
<style>
:root{--ink:#0f1729;--muted:#64748b;--line:#e2e8f0;--soft:#f1f5f9;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f6f8fc;color:var(--ink);padding:24px}
.wrap{max-width:1180px;margin:0 auto}
.head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px}
h1{font-size:22px;font-weight:700}
.sub{color:var(--muted);font-size:12px;margin-top:3px}
.pickers{display:flex;gap:16px;flex-wrap:wrap}
.pick{display:flex;flex-direction:column;gap:4px}
.pick label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
select{font-size:15px;padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;font-weight:600;cursor:pointer;min-width:190px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
.kpi .v{font-size:23px;font-weight:700;margin-top:6px}
.kpi .d{font-size:12px;margin-top:4px;color:var(--muted)}
.up{color:#dc2626!important}.down{color:#059669!important}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
.card h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.bar-row.clk{cursor:pointer}.bar-row.clk:hover .name{text-decoration:underline}
.bar-row .name{width:172px;font-size:13px;font-weight:600;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--soft);border-radius:6px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease}
.bar-row .amt{width:80px;text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.over{color:#dc2626}
.flag{font-size:10px;font-weight:700;color:#dc2626;background:#fee2e2;padding:1px 6px;border-radius:20px;margin-left:6px}
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.legend{font-size:12.5px;flex:1;min-width:160px}
.legend div{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend .lv{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.trend{display:flex;align-items:flex-end;gap:5px;height:140px;padding-top:8px}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.tb .col{width:100%;background:#cbd5e1;border-radius:5px 5px 0 0;transition:all .25s;min-height:2px}
.tb.sel .col{background:#2563eb}
.tb:hover .col{opacity:.82}
.tb .ml{font-size:9.5px;color:var(--muted);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:6px 8px;border-bottom:2px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--soft)}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
.empty{color:var(--muted);font-size:13px;padding:14px 4px}
.foot{color:var(--muted);font-size:11px;margin-top:14px;text-align:center}
@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.bar-row .name{width:120px}}
</style></head>
<body><div class="wrap">
<div class="head">
  <div><h1>Expense Dashboard</h1><div class="sub" id="subtitle"></div></div>
  <div class="pickers">
    <div class="pick"><label for="win">12-month group</label><select id="win"></select></div>
    <div class="pick"><label for="mon">Month</label><select id="mon"></select></div>
    <div class="pick"><label for="cat">Category</label><select id="cat"></select></div>
    <div class="pick"><label for="sub">Sub-category</label><select id="sub"></select></div>
  </div>
</div>
<div class="kpis" id="kpis"></div>
<div class="grid">
  <div class="card"><h2 id="barsTitle">Spend by category</h2><div id="bars"></div></div>
  <div class="card"><h2 id="shareTitle">Share</h2><div class="donut-wrap"><div id="donut"></div><div class="legend" id="legend"></div></div></div>
</div>
<div class="card" style="margin-bottom:16px"><h2 id="trendTitle">Monthly trend &mdash; click a bar to select a month</h2><div class="trend" id="trend"></div></div>
<div class="grid">
  <div class="card"><h2 id="brkTitle">Sub-category breakdown</h2><div id="breakdown"></div></div>
  <div class="card"><h2 id="topTitle">Largest transactions</h2><div id="toptx"></div></div>
</div>
<div class="foot" id="foot"></div>
</div>

  document.getElementById("shareTitle").textContent=(level==='top'?"Category share":(level==='sub'?("Sub-category share · "+c):("Merchant share · "+sb)));
  let acc=0; const segs=groups.filter(g=>g.v>0).map((g,i)=>{const f=total?g.v/total:0;const s=`<circle r="56" cx="80" cy="80" fill="transparent" stroke="${colorOf(g.name,i)}" stroke-width="34" stroke-dasharray="${f*C} ${C}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 80 80)"></circle>`;acc+=f;return s;}).join("");
  document.getElementById("donut").innerHTML=`<svg width="160" height="160" viewBox="0 0 160 160"><circle r="56" cx="80" cy="80" fill="transparent" stroke="#eef2f7" stroke-width="34"></circle>${segs}<text x="80" y="76" text-anchor="middle" font-size="12" fill="#64748b">Total</text><text x="80" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#0f1729">${fmt(total)}</text></svg>`;
  document.getElementById("legend").innerHTML=groups.filter(g=>g.v>0).map((g,i)=>`<div><span class="dot" style="background:${colorOf(g.name,i)}"></span>${g.name}<span class="lv">${total?Math.round(g.v/total*100):0}%</span></div>`).join("")||'<div class="empty">—</div>';
  // trend (respects category filter)
  const totals=months.map(mm=>TXW.filter(t=>t.m===mm&&(c==="ALL"||t.t===c)&&(sb==="ALL"||t.sub===sb)).reduce((s,t)=>s+t.a,0));
  const tmx=Math.max(...totals,1);
  document.getElementById("trendTitle").innerHTML=("Monthly trend — "+(c==="ALL"?"total":(sb==="ALL"?c:sb)))+" &nbsp;<span style='font-weight:400;text-transform:none;color:#94a3b8'>(click a bar to select a month)</span>";
  document.getElementById("trend").innerHTML=months.map((mm,i)=>`<div class="tb ${mm===m?'sel':''}" data-m="${mm}" title="${mlabel(mm)}: ${fmt(totals[i])}"><div class="col" style="height:${totals[i]/tmx*110}px;${mm===m?'background:'+(c==="ALL"?'#2563eb':(COL[c]||'#2563eb')):''}"></div><div class="ml">${MN[+mm.split("-")[1]-1]} ${mm.split("-")[0].slice(2)}</div></div>`).join("");
  document.querySelectorAll(".tb").forEach(el=>el.onclick=()=>{selM.value=el.dataset.m;render();});
  // breakdown table
  if(level==='merchant'){
    const mo={}; rows.forEach(t=>{const k=merchantName(t.desc); if(!mo[k])mo[k]={name:k,a:0,n:0}; mo[k].a+=t.a; mo[k].n++;});
    const ms=Object.values(mo).sort((a,b)=>b.a-a.a).slice(0,18);
    document.getElementById("brkTitle").textContent="Merchant split · "+sb+" — "+(m==="ALL"?"window":mlabel(m));
    document.getElementById("breakdown").innerHTML = ms.length? `<table><thead><tr><th>Merchant</th><th class="r">Amount</th><th class="r">#</th></tr></thead><tbody>${ms.map((x,i)=>`<tr><td><span class="pill" style="background:${PALETTE[i%PALETTE.length]}"></span>${x.name}</td><td class="r">${fmt2(x.a)}</td><td class="r">${x.n}</td></tr>`).join("")}</tbody></table>` : '<div class="empty">No spend for this selection.</div>';
  } else {
    const so={}; rows.forEach(t=>{const k=t.t+"||"+t.sub;if(!so[k])so[k]={t:t.t,sub:t.sub,a:0,n:0};so[k].a+=t.a;so[k].n++;});
    const subs=Object.values(so).sort((a,b)=>b.a-a.a).slice(0,16);
    document.getElementById("brkTitle").textContent="Sub-category breakdown"+(c==="ALL"?"":" · "+c)+" — "+(m==="ALL"?"window":mlabel(m));
    document.getElementById("breakdown").innerHTML = subs.length? `<table><thead><tr><th>Category</th><th>Sub-category</th><th class="r">Amount</th><th class="r">#</th></tr></thead><tbody>${subs.map(s=>`<tr><td><span class="pill" style="background:${COL[s.t]}"></span>${s.t}</td><td>${s.sub}</td><td class="r">${fmt2(s.a)}</td><td class="r">${s.n}</td></tr>`).join("")}</tbody></table>` : '<div class="empty">No spend for this selection.</div>';
  }
  // top tx
  const top=rows.slice().sort((a,b)=>b.a-a.a).slice(0,12);
  document.getElementById("topTitle").textContent="Largest transactions"+(c==="ALL"?"":(" · "+(sb==="ALL"?c:sb)))+" — "+(m==="ALL"?"window":mlabel(m));
  document.getElementById("toptx").innerHTML = top.length? `<table><thead><tr><th>Date</th><th>Description</th><th class="r">Amount</th></tr></thead><tbody>${top.map(t=>`<tr><td>${fmtd(t.d)}</td><td><span class="pill" style="background:${COL[t.t]}"></span>${clean(t.desc).slice(0,44)}</td><td class="r">${fmt2(t.a)}</td></tr>`).join("")}</tbody></table>` : '<div class="empty">No transactions.</div>';
  document.getElementById("subtitle").textContent=`${mlabel(months[0])} – ${mlabel(months[months.length-1])} · ${TXW.length} transactions in window · built ${GEN}`;
  document.getElementById("foot").textContent="Source: categorized statement data · excludes transfers, savings/investments, tax, the credit-card bill & business travel (recovered) · OVER = above default monthly threshold (editable in the workbook).";
}
selW.onchange=()=>{setWindow(+selW.value);populateMonths();selM.value="ALL";populateSubs();render();};
selM.onchange=render;
selC.onchange=()=>{populateSubs();render();};
selS.onchange=render;
populateSubs();
render();
</script></body></html>
